defaults:
  - env/libero_10@env.eval
  - model/gr00t_n1d7@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout: all

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_10_gr00t_n1d7_collect"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"

  eval:
    rollout_epoch: 1
    # RECAP rollout collection: diverse coverage with successes AND failures.
    # 16 envs (host RAM) x ~2 episodes/env per pass (1024/512); launcher runs
    # several seeds with random reset states for diversity.
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 1024
    group_size: 1
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: False
    is_eval: True
    seed: 0
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval
    data_collection:
      enabled: true
      save_dir: /data/datasets/n1d7_rollouts_pkl/run_0
      export_format: pickle
      robot_type: libero
      only_success: false
      fps: 20
      finalize_interval: 50

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_type: "gr00t_n1d7"
    model_path: /data/checkpoints/GR00T-N1.7-LIBERO/libero_10
    backbone_model_path: /data/checkpoints/Cosmos-Reason2-2B
    embodiment_tag: "libero_sim"
    num_action_chunks: 16
    denoising_steps: 4
    add_value_head: False
    rl_head_config:
      add_value_head: False
