# RECAP stage 3 — compute per-step advantages for LIBERO-Long (GR00T pipeline).
#
# A = normalize(r_{t:t+N}) + gamma^N * V(o_{t+N}) - V(o_t); top positive_quantile
# fraction labelled positive. Writes meta/advantages_{tag}.parquet.
# Runs in the openpi venv (vla-rlft-openpi).
#
# Usage:
#   cd examples/recap/process
#   python compute_advantages.py --config-name compute_advantages_libero \
#       advantage.value_checkpoint=/data/checkpoints/value_libero10_run/checkpoints/global_step_200

defaults:
  - model/value@advantage.model

advantage:
  value_checkpoint: /data/checkpoints/value_libero10_run/checkpoints/global_step_200
  batch_size: 128
  flush_interval: 256
  num_dataloader_workers_per_gpu: 8
  prefetch_factor: 2
  discount_next_value: true

  # Top 30% of samples get positive advantage (RECAP eps_l = 30th percentile).
  positive_quantile: 0.3

  tag: "sft"
  returns_tag: "sft"

  model:
    critic_expert_variant: "gemma_1m"
    tokenizer_path: /data/checkpoints/gemma-3-270m
    siglip_path: /data/checkpoints/siglip2-so400m-patch14-224
    gemma3_path: /data/checkpoints/gemma-3-270m

data:
  model_type: "pi05"
  robot_type: "libero"

  train_data_paths:
    - dataset_path: "/data/datasets/libero_10_no_noops_lerobot"
      robot_type: "libero"
      type: "sft"
      weight: 1.0

  advantage_lookahead_step: 10
  gamma: 1.0

  # stats.json has no "return" key; set the raw return range explicitly
  # (returns_sft.parquet spans [-504, 0] for LIBERO-Long).
  return_min: -504.0
  return_max: 0.0

distributed:
  enabled: true
  backend: "nccl"
  timeout: 3600

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
