# RECAP advantages on the SFT + rollout mix (full-scale), using the full value model.
# SFT entries -> all positive; rollout entries -> threshold-based (real NEGATIVES).
# Writes advantages_full.parquet into each dataset. Run in openpi venv.

defaults:
  - model/value@advantage.model

advantage:
  value_checkpoint: /data/checkpoints/value_libero10_full/value_sft_libero10_full/checkpoints/global_step_3000
  batch_size: 128
  flush_interval: 256
  num_dataloader_workers_per_gpu: 0   # avoid /dev/shm exhaustion
  prefetch_factor: 2
  discount_next_value: true
  positive_quantile: 0.3
  tag: "full"
  returns_tag: "all"
  model:
    critic_expert_variant: "gemma_1m"
    tokenizer_path: /data/checkpoints/gemma-3-270m
    siglip_path: /data/checkpoints/siglip2-so400m-patch14-224
    gemma3_path: /data/checkpoints/gemma-3-270m

data:
  model_type: "pi05"
  robot_type: "libero"
  train_data_paths:
    - dataset_path: "/data/datasets/libero_10_no_noops_lerobot"
      robot_type: "libero"
      type: "sft"
      weight: 1.0
    - dataset_path: "/data/datasets/libero_10_gr00t_rollouts"
      robot_type: "libero"
      type: "rollout"
      weight: 1.0
  advantage_lookahead_step: 10
  gamma: 1.0
  return_min: -779.0
  return_max: 0.0

distributed:
  enabled: true
  backend: "nccl"
  timeout: 3600

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
