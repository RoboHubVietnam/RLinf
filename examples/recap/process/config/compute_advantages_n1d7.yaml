# RECAP stage 3 — per-step advantages for the GR00T N1.7 LIBERO-Long rollout dataset.
#
# A = normalize(r_{t:t+N}) + gamma^N * V(o_{t+N}) - V(o_t); top positive_quantile
# fraction labelled positive. Writes meta/advantages_{tag}.parquet.
# Runs in the openpi venv (vla-rlft-openpi).

defaults:
  - model/value@advantage.model

advantage:
  value_checkpoint: /data/checkpoints/n1d7_value/value_sft_n1d7_libero10/checkpoints/global_step_500
  batch_size: 128
  flush_interval: 256
  num_dataloader_workers_per_gpu: 4
  prefetch_factor: 2
  discount_next_value: true

  # Top 30% of samples get positive advantage (RECAP eps_l = 30th percentile).
  positive_quantile: 0.3

  tag: "rollout"
  returns_tag: "rollout"

  model:
    critic_expert_variant: "gemma_1m"
    tokenizer_path: /data/checkpoints/gemma-3-270m
    siglip_path: /data/checkpoints/siglip2-so400m-patch14-224
    gemma3_path: /data/checkpoints/gemma-3-270m

data:
  model_type: "pi05"
  robot_type: "libero"

  train_data_paths:
    - dataset_path: "/data/datasets/n1d7_libero_rollouts"
      robot_type: "libero"
      type: "rollout"
      weight: 1.0

  advantage_lookahead_step: 10
  gamma: 1.0

  # Rollout returns span [-811, 0].
  return_min: -811.0
  return_max: 0.0

distributed:
  enabled: true
  backend: "nccl"
  timeout: 3600

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
