# RECAP value model — full-scale run on the SFT + rollout mix (success + failure).
# Runs in the openpi venv (vla-rlft-openpi).

defaults:
  - model/value@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "value_sft_libero10_full"
    logger_backends: ["tensorboard"]
  max_epochs: 30000
  max_steps: 3000
  val_check_interval: -1
  save_interval: 1500

data:
  tag: "all"   # loads returns_all.parquet from each dataset
  train_data_paths:
    - dataset_path: "/data/datasets/libero_10_no_noops_lerobot"
      type: "sft"
      weight: 1.0
      robot_type: "libero_v2"
      model_type: "pi05"
    - dataset_path: "/data/datasets/libero_10_gr00t_rollouts"
      type: "rollout"
      weight: 1.0
      robot_type: "libero_v2"
      model_type: "pi05"
  eval_data_paths: []
  train_num_workers: 8
  eval_num_workers: 0
  prefetch_factor: 4
  persistent_workers: false
  pin_memory: false
  include_state: true
  gamma: 1.0
  action_horizon: 10
  normalize_to_minus_one_zero: true
  include_next_obs: false
  action_dim: 7
  robot_type: "libero_v2"
  model_type: "pi05"
  # Range covers both datasets (rollout failures reach -779).
  return_min: -779.0
  return_max: 0.0
  balance_weights: true
  seed: 42

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 64
  seed: 0
  model:
    precision: bf16
    siglip_path: "/data/checkpoints/siglip2-so400m-patch14-224"
    gemma3_path: "/data/checkpoints/gemma-3-270m"
    tokenizer_path: "/data/checkpoints/gemma-3-270m"
    freeze_vlm: false
    action_dim: 7
    action_horizon: 10
  optim:
    lr: 5.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1e-10
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: 300
    total_training_steps: 3000
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False
critic:
  use_critic_model: False
