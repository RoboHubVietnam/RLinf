# RECAP stage 4 — CFG (advantage-conditioned) training for GR00T N1.5 on LIBERO-Long.
#
# Usage:
#   cd examples/recap/cfg
#   python train_cfg.py --config-name libero_cfg_gr00t
#
# Prereqs: meta/advantages_{data.advantage_tag}.parquet in the dataset (RECAP #6).

defaults:
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "cfg_sft_gr00t_libero10"
    logger_backends: ["tensorboard"]

  max_epochs: 30000
  max_steps: -1
  val_check_interval: -1
  save_interval: 3000

data:
  num_workers: 8
  # Loads meta/advantages_{advantage_tag}.parquet from each dataset (RECAP #6 output).
  advantage_tag: "sft"
  video_backend: "torchcodec"   # LIBERO videos are AV1; only torchcodec decodes them
  balance_dataset_weights: true
  seed: 42

  train_data_paths:
    - dataset_path: "/data/datasets/libero_10_no_noops_lerobot"
      type: "sft"
      weight: 1.0

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 128
  seed: 0

  model:
    # bf16 master (GR00T-native, fast, fits a single 32GB GPU). The earlier
    # persistent NaN was NOT a precision problem: it was the advantage_embedding
    # (a CFG-only param missing from the SFT checkpoint) materialized from
    # uninitialized memory by from_pretrained — now re-initialized in get_model.
    # With that fixed, bf16 trains with finite grad norms. reduce_dtype=fp32 below
    # keeps the gradient reduction stable.
    precision: bf16
    is_lora: false
    load_to_device: true
    model_path: "/data/checkpoints/RLinf-Gr00t-SFT-10"
    model_type: "gr00t_cfg"
    embodiment_tag: "libero_franka"
    num_action_chunks: 8
    obs_converter_type: "libero"
    denoising_steps: 4
    # Backbone (Eagle VLM) frozen; only the action head + advantage embedding train.
    tune_visual: false
    tune_llm: false
    # CFG / RECAP knobs
    advantage_cfg_dropout_prob: 0.3
    cfg_guidance_weight: 1.0
    positive_only_conditional: false

  optim:
    lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1.0e-10
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: 2000
    total_training_steps: 30000
    min_lr: 0.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    # Required: model mixes a frozen Eagle backbone with a trainable action head;
    # use_orig_params=False trips FSDP's flat-param view-inplace guard.
    use_orig_params: True
    # Must be False: gradient checkpointing re-runs the action head forward under
    # no_grad during recompute, which (combined with the frozen-backbone no_grad)
    # produced a separate NaN loss. The head is small, so recompute saves little.
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      # fp32 gradient reduction — bf16 reduce produces NaN grad norms here.
      reduce_dtype: fp32
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
